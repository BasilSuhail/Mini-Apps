<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Flowers 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #2a2a2a 0%, #000000 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        header {
            background: #3a3a3a;
            padding: 30px;
            text-align: center;
            border-bottom: 3px solid #555;
        }

        h1 {
            color: #ffffff;
            font-size: 3em;
            font-weight: 300;
            letter-spacing: 3px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 120px);
            cursor: crosshair;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 2em;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .instruction.hidden {
            opacity: 0;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 1.2em;
            transition: all 0.3s;
        }

        #music-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>Draw Flowers</h1>
    </header>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div class="instruction" id="instruction">Click To Add Flowers</div>
        <div class="controls">
            <button id="clear-btn">Clear Canvas</button>
        </div>
        <button id="music-toggle">🎵 Music</button>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4620b85d1a.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const instruction = document.getElementById('instruction');
        const clearBtn = document.getElementById('clear-btn');
        const musicToggle = document.getElementById('music-toggle');
        const bgMusic = document.getElementById('bgMusic');

        // Set canvas size
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Flower colors (pink/purple gradient)
        const flowerColors = [
            { petal: ['#ff6b9d', '#ff8fab', '#ffa5b8'], center: '#ffd700' },
            { petal: ['#c77dff', '#9d4edd', '#b298dc'], center: '#ffa500' },
            { petal: ['#ff6ba8', '#ff8bc3', '#ffadd5'], center: '#ffb700' },
            { petal: ['#a855f7', '#9333ea', '#ba8bf7'], center: '#ff9500' }
        ];

        class Flower {
            constructor(x, y, size, colorScheme) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.colorScheme = colorScheme;
                this.stemHeight = size * 3 + Math.random() * size * 2;
                this.swayOffset = Math.random() * Math.PI * 2;
                this.swaySpeed = 0.02 + Math.random() * 0.02;
                this.stemCurve = (Math.random() - 0.5) * 30;
                this.petalCount = 5 + Math.floor(Math.random() * 3);
                this.rotation = Math.random() * Math.PI * 2;
                this.growProgress = 0;
            }

            update() {
                if (this.growProgress < 1) {
                    this.growProgress += 0.05;
                }
            }

            draw(time) {
                const sway = Math.sin(time * this.swaySpeed + this.swayOffset) * 5;
                const currentHeight = this.stemHeight * this.growProgress;
                const currentSize = this.size * this.growProgress;

                ctx.save();

                // Draw stem
                ctx.strokeStyle = `rgba(76, 153, 76, ${this.growProgress})`;
                ctx.lineWidth = Math.max(1, this.size / 8);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);

                // Curved stem
                const controlX = this.x + this.stemCurve + sway;
                const controlY = this.y - currentHeight / 2;
                const endX = this.x + sway;
                const endY = this.y - currentHeight;

                ctx.quadraticCurveTo(controlX, controlY, endX, endY);
                ctx.stroke();

                // Draw flower at the top of stem
                ctx.translate(endX, endY);
                ctx.rotate(this.rotation + sway * 0.02);

                // Draw petals
                for (let i = 0; i < this.petalCount; i++) {
                    const angle = (Math.PI * 2 / this.petalCount) * i;
                    ctx.save();
                    ctx.rotate(angle);

                    // Create gradient for petal
                    const gradient = ctx.createRadialGradient(0, -currentSize * 0.8, 0, 0, -currentSize * 0.8, currentSize * 0.6);
                    gradient.addColorStop(0, this.colorScheme.petal[0]);
                    gradient.addColorStop(0.5, this.colorScheme.petal[1]);
                    gradient.addColorStop(1, this.colorScheme.petal[2]);

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.ellipse(0, -currentSize * 0.8, currentSize * 0.4, currentSize * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }

                // Draw center
                const centerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, currentSize * 0.3);
                centerGradient.addColorStop(0, this.colorScheme.center);
                centerGradient.addColorStop(1, '#ff8c00');
                ctx.fillStyle = centerGradient;
                ctx.beginPath();
                ctx.arc(0, 0, currentSize * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // Sparkle/Particle class
        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 3;
                this.speedY = (Math.random() - 0.5) * 3 - 2;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.color = ['#ffcce7', '#ffd4f4', '#ffe4f7', '#fff9e6', '#ffeaa7'][Math.floor(Math.random() * 5)];
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.1; // gravity
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                if (this.life <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Draw star sparkle
                ctx.fillStyle = this.color;
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);

                    const innerAngle = angle + Math.PI / 5;
                    const innerX = Math.cos(innerAngle) * (this.size / 2);
                    const innerY = Math.sin(innerAngle) * (this.size / 2);
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // Butterfly class
        class Butterfly {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 8 + Math.random() * 8;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.wingAngle = 0;
                this.wingSpeed = 0.15 + Math.random() * 0.1;
                this.color1 = ['#ff6b9d', '#c77dff', '#ff6ba8', '#a855f7'][Math.floor(Math.random() * 4)];
                this.color2 = ['#ffa5b8', '#b298dc', '#ffadd5', '#ba8bf7'][Math.floor(Math.random() * 4)];
                this.targetX = this.x;
                this.targetY = this.y;
                this.changeTargetTimer = 0;
            }

            update() {
                // Change direction occasionally
                this.changeTargetTimer++;
                if (this.changeTargetTimer > 100) {
                    this.targetX = Math.random() * canvas.width;
                    this.targetY = Math.random() * canvas.height;
                    this.changeTargetTimer = 0;
                }

                // Move towards target
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.speedX += dx * 0.0001;
                this.speedY += dy * 0.0001;

                // Apply some damping
                this.speedX *= 0.98;
                this.speedY *= 0.98;

                this.x += this.speedX;
                this.y += this.speedY;

                // Wrap around screen
                if (this.x < -20) this.x = canvas.width + 20;
                if (this.x > canvas.width + 20) this.x = -20;
                if (this.y < -20) this.y = canvas.height + 20;
                if (this.y > canvas.height + 20) this.y = -20;

                this.wingAngle += this.wingSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                const wingFlap = Math.sin(this.wingAngle) * 0.5 + 0.5;

                // Draw body
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size * 0.15, this.size * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Draw left wing
                ctx.save();
                ctx.scale(1, 0.5 + wingFlap * 0.5);
                const gradient1 = ctx.createRadialGradient(-this.size * 0.3, 0, 0, -this.size * 0.3, 0, this.size);
                gradient1.addColorStop(0, this.color1);
                gradient1.addColorStop(1, this.color2);
                ctx.fillStyle = gradient1;
                ctx.beginPath();
                ctx.ellipse(-this.size * 0.5, -this.size * 0.2, this.size * 0.6, this.size * 0.8, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Draw right wing
                ctx.save();
                ctx.scale(1, 0.5 + wingFlap * 0.5);
                const gradient2 = ctx.createRadialGradient(this.size * 0.3, 0, 0, this.size * 0.3, 0, this.size);
                gradient2.addColorStop(0, this.color1);
                gradient2.addColorStop(1, this.color2);
                ctx.fillStyle = gradient2;
                ctx.beginPath();
                ctx.ellipse(this.size * 0.5, -this.size * 0.2, this.size * 0.6, this.size * 0.8, 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Antennae
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -this.size * 0.3);
                ctx.lineTo(-this.size * 0.2, -this.size * 0.6);
                ctx.moveTo(0, -this.size * 0.3);
                ctx.lineTo(this.size * 0.2, -this.size * 0.6);
                ctx.stroke();

                ctx.restore();
            }
        }

        let flowers = [];
        let sparkles = [];
        let butterflies = [];
        let animationId;
        let clickCount = 0;

        // Create initial butterflies
        for (let i = 0; i < 5; i++) {
            butterflies.push(new Butterfly());
        }

        function animate() {
            const time = Date.now() * 0.001;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw butterflies
            butterflies.forEach(butterfly => {
                butterfly.update();
                butterfly.draw();
            });

            // Update and draw flowers
            flowers.forEach(flower => {
                flower.update();
                flower.draw(time);
            });

            // Update and draw sparkles
            sparkles.forEach(sparkle => {
                sparkle.update();
                sparkle.draw();
            });

            // Remove dead sparkles
            sparkles = sparkles.filter(sparkle => !sparkle.isDead());

            animationId = requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Hide instruction after first click
            if (clickCount === 0) {
                instruction.classList.add('hidden');
            }
            clickCount++;

            // Random size and color
            const size = 15 + Math.random() * 25;
            const colorScheme = flowerColors[Math.floor(Math.random() * flowerColors.length)];

            flowers.push(new Flower(x, y, size, colorScheme));

            // Create sparkles at click position
            for (let i = 0; i < 12; i++) {
                sparkles.push(new Sparkle(x, y));
            }

            // Start animation if not already running
            if (!animationId) {
                animate();
            }
        });

        clearBtn.addEventListener('click', () => {
            flowers = [];
            sparkles = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            instruction.classList.remove('hidden');
            clickCount = 0;
        });

        // Music toggle
        let musicPlaying = false;
        musicToggle.addEventListener('click', () => {
            if (musicPlaying) {
                bgMusic.pause();
                musicToggle.textContent = '🎵 Music';
            } else {
                bgMusic.play().catch(e => console.log('Audio play failed:', e));
                musicToggle.textContent = '🔇 Music';
            }
            musicPlaying = !musicPlaying;
        });

        // Auto-play music on first interaction
        canvas.addEventListener('click', () => {
            if (!musicPlaying) {
                bgMusic.play().catch(e => console.log('Audio play failed:', e));
                musicPlaying = true;
                musicToggle.textContent = '🔇 Music';
            }
        }, { once: true });

        // Start animation loop
        animate();
    </script>
</body>
</html>
