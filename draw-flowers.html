<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Flowers</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-border: rgba(255, 255, 255, 0.3);
            --btn-hover: rgba(255, 255, 255, 0.2);
            --instruction-color: white;
            --stem-color: #4a7c4a;
        }

        [data-theme="light"] {
            --bg: #fdf6e3;
            --text: #073642;
            --btn-bg: rgba(0, 0, 0, 0.05);
            --btn-border: rgba(0, 0, 0, 0.1);
            --btn-hover: rgba(0, 0, 0, 0.1);
            --instruction-color: #073642;
            --stem-color: #2d5a27;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            height: 100vh;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            transition: background 0.5s ease;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: var(--bg);
            cursor: crosshair;
        }

        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--instruction-color);
            font-size: 2em;
            font-family: Georgia, serif;
            pointer-events: none;
            transition: opacity 1s, color 0.5s;
            z-index: 10;
            text-align: center;
            padding: 0 20px;
        }

        @media (max-width: 768px) {
            .instruction {
                font-size: 1.5em;
            }
        }

        .instruction.hidden {
            opacity: 0;
        }

        .clean-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background: var(--btn-bg);
            color: var(--text);
            border: 1px solid var(--btn-border);
            border-radius: 25px;
            cursor: pointer;
            font-family: Georgia, serif;
            backdrop-filter: blur(5px);
            z-index: 10;
            font-size: 16px;
            transition: all 0.3s;
        }

        .clean-btn:hover {
            background: var(--btn-hover);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .clean-btn {
                padding: 15px 40px;
                font-size: 18px;
                bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" title="Toggle Light Mode">🌙</button>
    <canvas id="canvas"></canvas>
    <div class="instruction" id="instruction">Click To Add Flowers</div>
    <button class="clean-btn" id="cleanBtn">Clean</button>

    <script>
        // Theme Persistence
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        function applyTheme(theme) {
            if (theme === 'light') {
                body.setAttribute('data-theme', 'light');
                themeToggle.textContent = '☀️';
            } else {
                body.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
            }
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const instruction = document.getElementById('instruction');
        const cleanBtn = document.getElementById('cleanBtn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Flower {
            constructor(x, y) {
                this.x = x;
                this.y = canvas.height;
                this.targetY = y;
                this.growProgress = 0;
                this.maxHeight = canvas.height - y;

                this.stemWidth = 2 + Math.random();
                this.curvature = (Math.random() - 0.5) * 80;
                this.swayPhase = Math.random() * Math.PI * 2;
                this.swaySpeed = 0.02 + Math.random() * 0.02;

                this.petalCount = 4 + Math.floor(Math.random() * 2);
                this.size = 25 + Math.random() * 20;
                this.rotation = Math.random() * Math.PI * 2;

                // Petal variations for organic look
                this.petalVariations = [];
                for (let i = 0; i < this.petalCount; i++) {
                    this.petalVariations.push({
                        sizeVar: 0.85 + Math.random() * 0.3,
                        angleVar: (Math.random() - 0.5) * 0.2
                    });
                }

                // Color palettes matching reference image
                const colorSchemes = [
                    { outer: '#ff1493', inner: '#ff6b35', center: '#ffd700' }, // Pink-Orange
                    { outer: '#8b00ff', inner: '#ff1493', center: '#ff6b35' }, // Purple-Pink
                    { outer: '#ff6b35', inner: '#ff8c42', center: '#ffd700' }, // Orange
                    { outer: '#c77dff', inner: '#ff69b4', center: '#ffa500' }, // Light Purple-Pink
                    { outer: '#00bfff', inner: '#87ceeb', center: '#ffff00' }, // Sky Blue-Yellow
                    { outer: '#4169e1', inner: '#6495ed', center: '#ffd700' }, // Royal Blue-Gold
                    { outer: '#32cd32', inner: '#90ee90', center: '#ffff66' }, // Green-Yellow
                    { outer: '#ffd700', inner: '#ffec8b', center: '#ff8c00' }, // Gold-Orange
                ];

                this.colors = colorSchemes[Math.floor(Math.random() * colorSchemes.length)];
                this.bloomed = false;
            }

            update() {
                if (this.growProgress < 1) {
                    this.growProgress += 0.01;
                    if (this.growProgress >= 0.8 && !this.bloomed) {
                        this.bloomed = true;
                    }
                }
            }

            draw(time) {
                const currentHeight = this.maxHeight * Math.min(this.growProgress, 1);
                const sway = Math.sin(time * this.swaySpeed + this.swayPhase) * 6;

                ctx.save();

                // Draw stem
                const startX = this.x;
                const startY = canvas.height;
                const cp1X = this.x + this.curvature / 2 + sway * 0.5;
                const cp1Y = canvas.height - currentHeight * 0.3;
                const cp2X = this.x + this.curvature + sway * 0.8;
                const cp2Y = canvas.height - currentHeight * 0.7;
                const endX = this.x + sway;
                const endY = canvas.height - currentHeight;

                const style = getComputedStyle(document.body);
                ctx.strokeStyle = style.getPropertyValue('--stem-color').trim();
                ctx.lineWidth = this.stemWidth;
                ctx.lineCap = 'round';

                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.bezierCurveTo(cp1X, cp1Y, cp2X, cp2Y, endX, endY);
                ctx.stroke();

                // Draw flower
                if (this.growProgress > 0.5) {
                    const flowerBloom = Math.min((this.growProgress - 0.5) * 2, 1);

                    ctx.translate(endX, endY);
                    ctx.rotate(this.rotation + sway * 0.01);

                    // Draw petals with variations
                    for (let i = 0; i < this.petalCount; i++) {
                        const baseAngle = (Math.PI * 2 / this.petalCount) * i;
                        const variation = this.petalVariations[i];
                        const angle = baseAngle + variation.angleVar;

                        ctx.save();
                        ctx.rotate(angle);

                        const petalSize = this.size * variation.sizeVar;

                        // Outer glow/edge
                        const outerGradient = ctx.createRadialGradient(
                            0, -petalSize * 0.5 * flowerBloom,
                            0,
                            0, -petalSize * 0.5 * flowerBloom,
                            petalSize * 0.7 * flowerBloom
                        );
                        outerGradient.addColorStop(0, this.colors.outer);
                        outerGradient.addColorStop(0.6, this.colors.inner);
                        outerGradient.addColorStop(1, 'rgba(0,0,0,0.1)');

                        ctx.fillStyle = outerGradient;
                        ctx.globalAlpha = 0.8;

                        ctx.beginPath();
                        ctx.ellipse(
                            0,
                            -petalSize * 0.5 * flowerBloom,
                            petalSize * 0.45 * flowerBloom,
                            petalSize * 0.7 * flowerBloom,
                            0, 0, Math.PI * 2
                        );
                        ctx.fill();

                        ctx.restore();
                    }

                    // Draw center
                    ctx.globalAlpha = 1;
                    const centerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 0.25 * flowerBloom);
                    centerGradient.addColorStop(0, this.colors.center);
                    centerGradient.addColorStop(0.6, this.colors.inner);
                    centerGradient.addColorStop(1, this.colors.outer);

                    ctx.fillStyle = centerGradient;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.25 * flowerBloom, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            getBloomPosition() {
                return {
                    x: this.x,
                    y: canvas.height - this.maxHeight
                };
            }
        }

        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2 - 1;
                this.size = 2 + Math.random() * 2;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                if (this.life <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.life * 0.6;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                const style = getComputedStyle(document.body);
                ctx.fillStyle = style.getPropertyValue('--text').trim();
                ctx.beginPath();
                for (let i = 0; i < 4; i++) {
                    const angle = (Math.PI / 2) * i;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        class Butterfly {
            constructor(targetFlower) {
                this.targetFlower = targetFlower;
                const flowerPos = targetFlower.getBloomPosition();
                this.x = Math.random() < 0.5 ? -30 : canvas.width + 30;
                this.y = Math.random() * canvas.height * 0.5;
                this.targetX = flowerPos.x + (Math.random() - 0.5) * 50;
                this.targetY = flowerPos.y + (Math.random() - 0.5) * 50;
                this.size = 10 + Math.random() * 12;
                this.phase = 'approaching';
                this.flutterTime = 0;
                this.hoverTime = 0;
                this.maxHoverTime = 150 + Math.random() * 100;
                this.wingAngle = 0;
                this.wingSpeed = 0.2 + Math.random() * 0.15;
                this.opacity = 0;
                this.fadeIn = true;

                const colors = [
                    { wing: '#00ffff', mid: '#00d4ff', accent: '#0080ff', edge: '#0040ff' },
                    { wing: '#ff00ff', mid: '#ff69b4', accent: '#8b00ff', edge: '#4b0082' },
                    { wing: '#ff1493', mid: '#ff69b4', accent: '#ffa0d2', edge: '#ff69b4' },
                    { wing: '#00ff00', mid: '#7cfc00', accent: '#adff2f', edge: '#7fff00' }
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.flutterTime++;
                this.wingAngle += this.wingSpeed;

                if (this.fadeIn && this.opacity < 1) {
                    this.opacity += 0.03;
                }

                if (this.phase === 'approaching') {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    this.x += dx * 0.02;
                    this.y += dy * 0.02 + Math.sin(this.flutterTime * 0.1) * 2;

                    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
                        this.phase = 'hovering';
                    }
                } else if (this.phase === 'hovering') {
                    this.hoverTime++;
                    this.x += Math.sin(this.flutterTime * 0.05) * 2;
                    this.y += Math.cos(this.flutterTime * 0.08) * 2;

                    if (this.hoverTime >= this.maxHoverTime) {
                        this.phase = 'leaving';
                        this.targetX = this.x < canvas.width / 2 ? -30 : canvas.width + 30;
                        this.targetY = Math.random() * canvas.height * 0.3;
                        this.fadeIn = false;
                    }
                } else if (this.phase === 'leaving') {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    this.x += dx * 0.03;
                    this.y += dy * 0.03 + Math.sin(this.flutterTime * 0.1) * 2;
                    this.opacity -= 0.02;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.translate(this.x, this.y);

                const wingFlap = Math.sin(this.wingAngle);
                const wingScale = 0.3 + Math.abs(wingFlap) * 0.7;

                ctx.globalCompositeOperation = 'lighter';

                // Left wing
                ctx.save();
                ctx.scale(1, wingScale);
                ctx.rotate(-0.2);

                const wingGradient1 = ctx.createRadialGradient(
                    -this.size * 0.3, -this.size * 0.4, 0,
                    -this.size * 0.5, -this.size * 0.5, this.size * 1.2
                );
                wingGradient1.addColorStop(0, this.color.wing);
                wingGradient1.addColorStop(0.3, this.color.mid);
                wingGradient1.addColorStop(0.6, this.color.accent);
                wingGradient1.addColorStop(0.9, this.color.edge);
                wingGradient1.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.shadowBlur = 30;
                ctx.shadowColor = this.color.wing;
                ctx.fillStyle = wingGradient1;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size * 0.3, -this.size * 0.2, -this.size * 0.6, -this.size * 0.5, -this.size * 0.5, -this.size * 0.9);
                ctx.bezierCurveTo(-this.size * 0.4, -this.size, -this.size * 0.2, -this.size * 0.8, 0, -this.size * 0.3);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 20;
                ctx.fillStyle = this.color.accent;
                ctx.beginPath();
                ctx.arc(-this.size * 0.4, -this.size * 0.6, this.size * 0.15, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                // Right wing
                ctx.save();
                ctx.scale(1, wingScale);
                ctx.rotate(0.2);

                const wingGradient2 = ctx.createRadialGradient(
                    this.size * 0.3, -this.size * 0.4, 0,
                    this.size * 0.5, -this.size * 0.5, this.size * 1.2
                );
                wingGradient2.addColorStop(0, this.color.wing);
                wingGradient2.addColorStop(0.3, this.color.mid);
                wingGradient2.addColorStop(0.6, this.color.accent);
                wingGradient2.addColorStop(0.9, this.color.edge);
                wingGradient2.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.shadowBlur = 30;
                ctx.shadowColor = this.color.wing;
                ctx.fillStyle = wingGradient2;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size * 0.3, -this.size * 0.2, this.size * 0.6, -this.size * 0.5, this.size * 0.5, -this.size * 0.9);
                ctx.bezierCurveTo(this.size * 0.4, -this.size, this.size * 0.2, -this.size * 0.8, 0, -this.size * 0.3);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 20;
                ctx.fillStyle = this.color.accent;
                ctx.beginPath();
                ctx.arc(this.size * 0.4, -this.size * 0.6, this.size * 0.15, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                // Body
                ctx.globalCompositeOperation = 'source-over';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#333';
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.ellipse(0, -this.size * 0.2, this.size * 0.08, this.size * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            isDone() {
                return this.phase === 'leaving' && this.opacity <= 0;
            }
        }

        let flowers = [];
        let butterflies = [];
        let sparkles = [];
        let hasClicked = false;

        function animate() {
            const time = Date.now() * 0.001;

            const style = getComputedStyle(document.body);
            ctx.fillStyle = style.getPropertyValue('--bg').trim();
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            flowers.forEach(flower => {
                flower.update();
                flower.draw(time);

                if (flower.bloomed && Math.random() < 0.01) {
                    if (butterflies.filter(b => b.targetFlower === flower).length === 0) {
                        butterflies.push(new Butterfly(flower));
                    }
                }
            });

            butterflies = butterflies.filter(butterfly => !butterfly.isDone());
            butterflies.forEach(butterfly => {
                butterfly.update();
                butterfly.draw();
            });

            sparkles = sparkles.filter(sparkle => !sparkle.isDead());
            sparkles.forEach(sparkle => {
                sparkle.update();
                sparkle.draw();
            });

            requestAnimationFrame(animate);
        }

        function handleInteraction(e) {
            e.preventDefault(); // Prevent scrolling on touch

            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.type === 'touchstart') {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            flowers.push(new Flower(x, y));

            // Create sparkles on click/touch
            for (let i = 0; i < 5; i++) {
                sparkles.push(new Sparkle(x, y));
            }

            if (!hasClicked) {
                instruction.classList.add('hidden');
                hasClicked = true;
            }
        }

        // Add both click and touch event listeners
        canvas.addEventListener('click', handleInteraction);
        canvas.addEventListener('touchstart', handleInteraction, { passive: false });

        cleanBtn.addEventListener('click', () => {
            flowers = [];
            butterflies = [];
            sparkles = [];
            instruction.classList.remove('hidden');
            hasClicked = false;
        });

        animate();
    </script>
</body>
</html>
